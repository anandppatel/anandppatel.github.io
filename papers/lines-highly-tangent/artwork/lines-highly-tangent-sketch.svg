<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-hidden="true">
<defs>
  <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
    <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" seed="17" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.35" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <style>
    .p{fill:none;stroke:#20242b;stroke-width:4.1;stroke-linecap:round;stroke-linejoin:round;filter:url(#rough);opacity:.74}
    .q{fill:none;stroke:#20242b;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;filter:url(#rough);opacity:.48}
    .r{fill:none;stroke:#20242b;stroke-width:1.45;stroke-linecap:round;stroke-linejoin:round;filter:url(#rough);opacity:.30}
    .d{fill:none;stroke:#20242b;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:10 12;filter:url(#rough);opacity:.42}
    .m{fill:#20242b;filter:url(#rough);opacity:.72}
    .a{fill:#8c2f2f;stroke:#8c2f2f;stroke-width:1.8;filter:url(#rough);opacity:.8}
    .wash{fill:#20242b;opacity:.045;filter:url(#rough)}
    .txt{font-family:EB Garamond, Georgia, serif;font-size:35px;fill:#20242b;opacity:.55;filter:url(#rough)}
    .small{font-family:EB Garamond, Georgia, serif;font-size:25px;fill:#20242b;opacity:.50;filter:url(#rough)}
  </style>
</defs>

  <path class="p" d="M165 390 C230 170 550 138 730 290 C650 470 345 485 165 390 Z"/>
  <path class="q" d="M145 250 L800 340 M150 310 L780 310 M165 365 L735 205"/>
  <circle class="a" cx="338" cy="282" r="7"/><circle class="a" cx="468" cy="298" r="7"/><circle class="a" cx="602" cy="316" r="7"/><circle class="a" cx="664" cy="326" r="7"/>
  <path class="d" d="M270 420 C405 360 552 345 700 360"/>
  <text class="small" x="118" y="134">lines with high-order contact</text>

</svg>
